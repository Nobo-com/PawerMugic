# Codemagic configuration for Android APK builds
# Put this file at the root of your repository

workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - keystore_credentials # optional, define secure keys in codemagic UI if needed
      vars:
        PACKAGE_NAME: "com.example"
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Ensure clean Gradle Wrapper
        script: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Ensure debug keystore exists
        script: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore || echo "Base64 decode failed"
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "Generating new debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          fi
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - fahimmia017740@gmail.com # Sends a notification when the build completes successfully
        notify:
          success: true
          failure: true
